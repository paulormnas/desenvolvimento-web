<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Finder - Aula 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>PokeFinder 🔍</h1>
            <p>Exemplo de Manipulação de DOM e Fetch API</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="pokemonInput" placeholder="Digite o nome do Pokémon...">
                <button id="searchBtn">Buscar</button>
            </div>

            <div id="resultCard" class="card hidden">
                <div class="card-header">
                    <h2 id="pokeName"></h2>
                    <span id="pokeId"></span>
                </div>
                <img id="pokeImg" src="" alt="Pokemon Image">
                <div class="card-body">
                    <div class="types" id="pokeTypes"></div>
                    <div class="stats">
                        <div class="stat">
                            <span class="label">Peso:</span>
                            <span id="pokeWeight"></span>
                        </div>
                        <div class="stat">
                            <span class="label">Altura:</span>
                            <span id="pokeHeight"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="errorMessage" class="error-message hidden">
                Pokémon não encontrado! Tente novamente.
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
